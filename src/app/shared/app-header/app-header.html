<header class="app-header">
  <div class="app-header__title-group">
    @if (showBack()) {
      <button type="button" class="app-header__back" (click)="goBack()" aria-label="Volver">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    }
    <h1 class="text-h1 app-header__title">{{ title() }}</h1>
  </div>

  <div class="app-header__user">
    <div class="app-header__user-info">
      <p class="text-label app-header__user-name">Melina Casachica</p>
      <p class="text-body-s app-header__user-role">RRHH Baufest</p>
    </div>

    <div class="avatar avatar--user" aria-hidden="true">MC</div>

    <button
      type="button"
      class="app-header__icon-btn"
      (click)="toggleTheme()"
      [attr.aria-pressed]="themeService.theme() === 'dark'"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    >
      @if (themeService.theme() === 'dark') {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M12 1.5v3M12 19.5v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1.5 12h3M19.5 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      }
    </button>

    <button type="button" class="app-header__icon-btn" (click)="logout()" aria-label="Cerrar sesión">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4M16 15l4-3-4-3M20 12H9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</header>
