<button
  type="button"
  class="employee-row"
  [class.employee-row--highlighted]="highlighted()"
  (click)="onClick()"
  [attr.aria-label]="
    employee().name + ', ' + employee().role + ' · ' + employee().area +
    ', progreso ' + employee().completedSteps + ' de ' + employee().totalSteps +
    ', ' + statusLabel(employee().status) + ', ingresó el ' + employee().joinDateLabel
  "
>
  <div class="employee-row__identity">
    <div class="avatar" aria-hidden="true">{{ employee().initials }}</div>
    <div class="employee-row__names">
      <p class="text-label employee-row__name-line">
        {{ employee().name }}
        @if (showRecentBadge()) {
          <span class="badge badge--reciente">Reciente</span>
        }
      </p>
      <p class="text-body-s employee-row__meta">{{ employee().role }} · {{ employee().area }}</p>
    </div>
  </div>

  <div class="employee-row__progress">
    <div
      class="progress-bar"
      role="progressbar"
      [attr.aria-valuenow]="employee().completedSteps"
      [attr.aria-valuemin]="0"
      [attr.aria-valuemax]="employee().totalSteps"
    >
      <div class="progress-bar__fill" [style.--fill]="employee().completedSteps / employee().totalSteps"></div>
    </div>
    <span class="text-body-s employee-row__fraction">{{ employee().completedSteps }}/{{ employee().totalSteps }}</span>
  </div>

  <span class="badge badge--{{ employee().status }} employee-row__status">{{ statusLabel(employee().status) }}</span>

  <span class="text-body-s employee-row__date">{{ employee().joinDateLabel }}</span>

  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" class="employee-row__chevron">
    <path d="m9 5 7 7-7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
